<!DOCTYPE html>
<html>
<head>
  <title>Subscribe - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">

  <style>
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .back{
      cursor:pointer;
      font-size:14px;
      color:#ff4fa3;
    }

    .plan{
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
    }

    .plan.active{
      border:1px solid #ff4fa3;
      box-shadow:0 0 0 1px rgba(255,79,163,0.15);
    }

    .plan-title{
      font-size:16px;
      font-weight:700;
      margin-bottom:6px;
    }

    .plan-price{
      font-size:20px;
      color:#ff4fa3;
      margin-bottom:10px;
    }

    .plan-features{
      font-size:13px;
      opacity:0.8;
      line-height:1.6;
      margin-bottom:12px;
    }

    .buy-btn{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:none;
      background:#ff4fa3;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="back" onclick="window.location.href='result.html'">← Back</div>
  <div>💎 Subscribe</div>
  <div></div>
</div>

<!-- Weekly -->
<div class="plan">
  <div class="plan-title">Weekly</div>
  <div class="plan-price">$4.99</div>
  <div class="plan-features">
    ✔️ 200 Tokens<br>
    ✔️ Faster replies<br>
    ✔️ Basic access
  </div>
  <button class="buy-btn">Buy</button>
</div>

<!-- Monthly -->
<div class="plan active">
  <div class="plan-title">Monthly</div>
  <div class="plan-price">$14.99</div>
  <div class="plan-features">
    ✔️ 800 Tokens<br>
    ✔️ Priority AI<br>
    ✔️ All features unlocked
  </div>
  <button class="buy-btn">Best Value</button>
</div>

<!-- VIP -->
<div class="plan">
  <div class="plan-title">VIP</div>
  <div class="plan-price">$29.99</div>
  <div class="plan-features">
    ✔️ Unlimited Chat<br>
    ✔️ Voice + Future Video<br>
    ✔️ Premium AI experience
  </div>
  <button class="buy-btn">Go VIP</button>
</div>

</body>
</html>
