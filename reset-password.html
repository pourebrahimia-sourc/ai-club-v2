<!DOCTYPE html>
<html>
<head>
  <title>Reset Password - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:#111;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:380px;
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:20px;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    h2{
      margin:0 0 16px 0;
      text-align:center;
      font-size:24px;
    }

    .field{
      margin-bottom:12px;
      position:relative;
    }

    .field input{
      width:100%;
      height:52px;
      border:none;
      outline:none;
      border-radius:14px;
      background:#111;
      border:1px solid #2b2b2b;
      color:#fff;
      padding:0 56px 0 14px;
      font-size:15px;
    }

    .field input::placeholder{
      color:rgba(255,255,255,0.45);
    }

    .toggle-pass{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      color:#ff4fa3;
      cursor:pointer;
      font-size:13px;
      padding:0;
    }

    .btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
      background:#ff4fa3;
      color:#fff;
      margin-top:8px;
    }

    .status{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      min-height:18px;
      color:#ff9ac8;
      line-height:1.5;
      word-break:break-word;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Set New Password</h2>

    <div class="field">
      <input id="password" type="password" placeholder="New Password" />
      <button class="toggle-pass" type="button" onclick="togglePassword('password', this)">Show</button>
    </div>

    <div class="field">
      <input id="confirmPassword" type="password" placeholder="Repeat Password" />
      <button class="toggle-pass" type="button" onclick="togglePassword('confirmPassword', this)">Show</button>
    </div>

    <button class="btn" onclick="resetPassword()">Update Password</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    function setStatus(text){
      document.getElementById('status').innerText = text || '';
    }

    function togglePassword(id, btn){
      const input = document.getElementById(id);
      if(input.type === 'password'){
        input.type = 'text';
        btn.innerText = 'Hide';
      } else {
        input.type = 'password';
        btn.innerText = 'Show';
      }
    }

    function getTokensFromUrl(){
      const hash = window.location.hash.substring(1);
      const hashParams = new URLSearchParams(hash);

      const access_token = hashParams.get('access_token');
      const refresh_token = hashParams.get('refresh_token');

      return { access_token, refresh_token };
    }

    async function resetPassword(){
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const { access_token, refresh_token } = getTokensFromUrl();

      if(!password || !confirmPassword){
        setStatus('Fill all fields');
        return;
      }

      if(password !== confirmPassword){
        setStatus('Passwords do not match');
        return;
      }

      if(password.length < 6){
        setStatus('Password must be at least 6 characters');
        return;
      }

      if(!access_token || !refresh_token){
        setStatus('Invalid or expired reset link');
        return;
      }

      setStatus('Updating password...');

      try{
        const res = await fetch('/api/auth', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            type:'update-password',
            access_token,
            refresh_token,
            password
          })
        });

        const data = await res.json();

        if(data.error){
          setStatus(data.error);
          return;
        }

        setStatus('Password updated ✔️');

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1200);
      } catch(e){
        setStatus('Error updating password');
      }
    }
  </script>

</body>
</html>
