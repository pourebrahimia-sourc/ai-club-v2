<!DOCTYPE html>
<html>
<head>
  <title>Login - AI Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:#111;
      color:#fff;
      font-family:Arial, Helvetica, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px 16px;
    }

    .login-wrap{
      width:100%;
      max-width:420px;
    }

    .logo{
      text-align:center;
      font-size:20px;
      font-weight:700;
      margin:0 0 18px 0;
      color:#fff;
    }

    .login-card{
      width:100%;
      background:#1a1a1a;
      border:1px solid #2b2b2b;
      border-radius:18px;
      padding:20px;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    .close-row{
      display:flex;
      justify-content:flex-end;
      margin-bottom:10px;
    }

    .close-btn{
      font-size:26px;
      line-height:1;
      color:#fff;
      cursor:pointer;
      user-select:none;
    }

    .mode-row{
      display:flex;
      gap:10px;
      margin-bottom:16px;
    }

    .mode-btn{
      flex:1;
      height:42px;
      border-radius:12px;
      border:1px solid #3a3a3a;
      background:#222;
      color:#fff;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
    }

    .mode-btn.active{
      background:#ff4fa3;
      border-color:#ff4fa3;
    }

    .login-title{
      text-align:center;
      font-size:32px;
      margin:0 0 8px 0;
    }

    .login-subtitle{
      text-align:center;
      font-size:14px;
      color:rgba(255,255,255,0.72);
      margin:0 0 20px 0;
      line-height:1.5;
    }

    .field{
      margin-bottom:12px;
      position:relative;
      width:100%;
    }

    .field input{
      width:100%;
      height:52px;
      border:none;
      outline:none;
      border-radius:14px;
      background:#111;
      border:1px solid #2b2b2b;
      color:#fff;
      padding:0 56px 0 14px;
      font-size:15px;
    }

    .field input::placeholder{
      color:rgba(255,255,255,0.45);
    }

    .toggle-pass{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      color:#ff4fa3;
      cursor:pointer;
      font-size:13px;
      padding:0;
    }

    .btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
      font-weight:700;
    }

    .btn-primary{
      background:#ff4fa3;
      color:#fff;
      margin-top:8px;
    }

    .login-links{
      margin-top:10px;
    }

    .btn-dark{
      background:#2a2a2a;
      color:#fff;
      border:1px solid #3a3a3a;
    }

    .extra-link{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:#ff4fa3;
      cursor:pointer;
    }

    .status{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      min-height:18px;
      color:#ff9ac8;
      line-height:1.5;
      word-break:break-word;
    }

    @media (max-width:640px){
      body{
        padding:18px 12px;
      }

      .login-card{
        padding:18px;
        border-radius:16px;
      }

      .login-title{
        font-size:28px;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="logo">AI Club</div>

    <div class="login-card">
      <div class="close-row">
        <span class="close-btn" onclick="closeLogin()">✕</span>
      </div>

      <div class="mode-row">
        <button id="loginModeBtn" class="mode-btn active" onclick="setMode('login')">Login</button>
        <button id="signupModeBtn" class="mode-btn" onclick="setMode('signup')">Sign Up</button>
      </div>

      <h2 id="pageTitle" class="login-title">Login</h2>
      <p id="pageSubtitle" class="login-subtitle">Sign in to continue to your AI girlfriend</p>

      <div class="field">
        <input id="email" type="email" placeholder="Email" />
      </div>

      <div class="field" id="nameWrap" style="display:none;">
        <input id="name" type="text" placeholder="Name" />
      </div>

      <div class="field">
        <input id="password" type="password" placeholder="Password" />
        <button class="toggle-pass" type="button" onclick="togglePassword('password', this)">Show</button>
      </div>

      <div class="field" id="confirmWrap" style="display:none;">
        <input id="confirmPassword" type="password" placeholder="Repeat Password" />
        <button class="toggle-pass" type="button" onclick="togglePassword('confirmPassword', this)">Show</button>
      </div>

      <button id="mainBtn" class="btn btn-primary" onclick="submitAuth()">Login</button>

      <div class="login-links">
        <button class="btn btn-dark" onclick="googleLogin()">Google</button>
      </div>

      <div id="forgotLink" class="extra-link" onclick="forgotPassword()">Forgot password?</div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    let mode = 'login';

    const statusEl = document.getElementById('status');
    const confirmWrap = document.getElementById('confirmWrap');
    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');
    const mainBtn = document.getElementById('mainBtn');
    const forgotLink = document.getElementById('forgotLink');
    const loginModeBtn = document.getElementById('loginModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');

    function setStatus(text){
      statusEl.innerText = text || '';
    }

    function saveAuth(data){
      if (data?.session?.access_token) {
        localStorage.setItem('accessToken', data.session.access_token);
      }
      if (data?.session?.refresh_token) {
        localStorage.setItem('refreshToken', data.session.refresh_token);
      }
      if (data?.user?.id) {
        localStorage.setItem('userId', data.user.id);
      }
      localStorage.setItem('userEmail', data?.user?.email || '');
      localStorage.setItem('userName', data?.user?.user_metadata?.name || 'User');
    }

    function clearGeneratedState(){
      [
        'age',
        'ethnicity',
        'body',
        'bodyDetails',
        'hair',
        'appearanceDetails',
        'personality',
        'aiImage',
        'imageUnlocked',
        'lastProfileKey',
        'aiName',
        'recentChats'
      ].forEach(key => localStorage.removeItem(key));
    }

    function resetStateIfUserChanged(nextUserId){
      const previousUserId = localStorage.getItem('userId');
      if(previousUserId && nextUserId && previousUserId !== nextUserId){
        clearGeneratedState();
      }
    }

    function getPostAuthRedirect(){
      return 'index.html';
    }

    function togglePassword(id, btn){
      const input = document.getElementById(id);
      if(input.type === 'password'){
        input.type = 'text';
        btn.innerText = 'Hide';
      } else {
        input.type = 'password';
        btn.innerText = 'Show';
      }
    }

    function setMode(newMode){
      mode = newMode;

      if(mode === 'login'){
        document.getElementById('nameWrap').style.display = 'none';
        confirmWrap.style.display = 'none';
        pageTitle.innerText = 'Login';
        pageSubtitle.innerText = 'Sign in to continue to your AI girlfriend';
        mainBtn.innerText = 'Login';
        forgotLink.style.display = 'block';
        loginModeBtn.classList.add('active');
        signupModeBtn.classList.remove('active');
      } else {
        document.getElementById('nameWrap').style.display = 'block';
        confirmWrap.style.display = 'block';
        pageTitle.innerText = 'Sign Up';
        pageSubtitle.innerText = 'Create your account';
        mainBtn.innerText = 'Create Account';
        forgotLink.style.display = 'none';
        signupModeBtn.classList.add('active');
        loginModeBtn.classList.remove('active');
      }

      setStatus('');
    }

    async function submitAuth(){
      if(mode === 'login'){
        await login();
      } else {
        await signup();
      }
    }

    async function signup(){
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const name = document.getElementById('name').value.trim();

      if(!email || !password || !confirmPassword || !name){
        setStatus('Fill all fields');
        return;
      }

      if(password !== confirmPassword){
        setStatus('Passwords do not match');
        return;
      }

      setStatus('Creating account...');

      try{
        const res = await fetch('/api/auth', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            type:'signup',
            email,
            password,
            name
          })
        });

        const data = await res.json();

        if(data.error){
          setStatus(data.error);
          return;
        }

        if (!data.session?.access_token) {
          setStatus('Account created. Please check your email, then log in.');
          setMode('login');
          return;
        }
const newUserId = data.user.id;

if (localStorage.getItem('lastUserId') !== newUserId) {
  clearGeneratedState();
}

localStorage.setItem('lastUserId', newUserId);
        resetStateIfUserChanged(data?.user?.id);
        saveAuth(data);
        window.location.href = getPostAuthRedirect();
      } catch(e){
        setStatus('Signup failed');
      }
    }

    async function login(){
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if(!email || !password){
        setStatus('Enter email and password');
        return;
      }

      setStatus('Logging in...');

      try{
        const res = await fetch('/api/auth', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            type:'login',
            email,
            password
          })
        });

        const data = await res.json();

        if(data.error){
          setStatus(data.error);
          return;
        }

        if (!data.session?.access_token) {
          setStatus('Login session failed');
          return;
        }
const newUserId = data.user.id;

if (localStorage.getItem('lastUserId') !== newUserId) {
  clearGeneratedState();
}

localStorage.setItem('lastUserId', newUserId);
        resetStateIfUserChanged(data?.user?.id);
        saveAuth(data);
        window.location.href = getPostAuthRedirect();
      } catch(e){
        setStatus('Login failed');
      }
    }

    async function googleLogin(){
      try{
        const res = await fetch('/api/auth', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            type:'google'
          })
        });

        const data = await res.json();

        if(data.error){
          setStatus(data.error);
          return;
        }

        window.location.href = data.url;
      } catch(e){
        setStatus('Google login failed');
      }
    }

    async function forgotPassword(){
      const email = document.getElementById('email').value.trim();

      if(!email){
        setStatus('Enter your email');
        return;
      }

      setStatus('Sending reset email...');

      try{
        const res = await fetch('/api/auth', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            type:'forgot',
            email
          })
        });

        const data = await res.json();

        if(data.error){
          setStatus(data.error);
          return;
        }

        setStatus('Reset email sent ✔️');
      } catch(e){
        setStatus('Error sending email');
      }
    }

    setMode('login');
    function closeLogin(){
  const returnTo = localStorage.getItem('loginReturnTo');
  localStorage.removeItem('loginReturnTo');
  window.location.href = returnTo || 'index.html';
}
  </script>

</body>
</html>
