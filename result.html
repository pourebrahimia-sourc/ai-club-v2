<!DOCTYPE html>
<html>
<head>
  <title>Your AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes revealUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-reveal {
      opacity: 0;
      animation: revealUp 0.42s ease forwards;
    }

    .result-reveal-delay-1 { animation-delay: 0.06s; }
    .result-reveal-delay-2 { animation-delay: 0.12s; }
  </style>
</head>
<body>
<div class="header result-reveal" style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">

  <div style="font-weight:700;font-size:18px;">
    AI Club
  </div>

  <div style="display:flex;align-items:center;gap:10px;">

    <button onclick="goSubscribe()" style="
      padding:6px 12px;
      border-radius:10px;
      border:none;
      background:#ff4fa3;
      color:#fff;
      font-size:12px;
      cursor:pointer;
    ">
      Subscribe
    </button>

    <div id="tokenBalance" style="
      background:#1a1a1a;
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
    ">
      💰 ...
    </div>

    <div onclick="goGift()" style="
      font-size:18px;
      cursor:pointer;
    ">
      🎁
    </div>

    <div onclick="goProfile()" style="
      width:34px;
      height:34px;
      border-radius:50%;
      background:#2a2a2a;
      border:1px solid #3a3a3a;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      overflow:hidden;
    ">
      <span style="font-size:14px;">👤</span>
    </div>

  </div>
</div>

<h2 class="title" style="font-size:18px;margin-bottom:6px;">
  Your AI Girlfriend ✨
</h2>

<p class="subtitle" style="font-size:13px;margin-bottom:12px;">
  Your custom match
</p>

<div id="aiImageBox" class="result-reveal result-reveal-delay-1" style="
margin-bottom:10px;
text-align:center;
display:flex;
justify-content:center;
position:relative;
">
 
  <div id="imageLock" style="
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:6;
    width:110px;
    height:110px;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    background:rgba(0,0,0,0.52);
    border:1.5px solid rgba(255,255,255,0.7);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    color:#fff;
    cursor:pointer;
  ">
    <div style="font-size:34px;line-height:1;">🔒</div>
    <div style="font-size:12px;font-weight:700;line-height:1.2;">Unlock</div>
    <div style="font-size:11px;opacity:0.9;line-height:1;">10 tokens</div>
  </div>

  <img id="aiImage" src="images/locked-preview.png" style="
    width:42%;
    max-width:210px;
    height:auto;
    border-radius:14px;
    display:block;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    filter:blur(20px);
    opacity:1;
    transition:opacity 0.45s ease, filter 0.45s ease;
  ">

  <div style="
    position:absolute;
    bottom:12px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    z-index:10;
  ">
    <div style="
      position:absolute;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      width:50%;
      display:flex;
      gap:6px;
      z-index:10;
      flex-wrap:nowrap;
      align-items:center;
    ">
      <button onclick="startChat()" style="
        flex:1;
        padding:8px 6px;
        border-radius:10px;
        border:none;
        background:#ff4fa3;
        color:#fff;
        font-weight:600;
        height:34px;
        font-size:12px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        white-space:nowrap;
      ">
        Start Chat
      </button>

      <button id="editBtn" onclick="editCharacter()" style="
        flex:1;
        padding:8px 6px;
        border-radius:10px;
        border:none;
        background:#ff4fa3;
        color:#fff;
        font-weight:600;
        height:34px;
        font-size:12px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        white-space:nowrap;
      ">
        Edit
      </button>

      <button id="regenerateBtn" onclick="generateImage()" style="
        padding:8px 10px;
        border-radius:10px;
        border:none;
        background:#ff4fa3;
        color:#fff;
        font-weight:600;
        height:34px;
        font-size:11px;
        cursor:pointer;
        display:none;
        align-items:center;
        justify-content:center;
        white-space:nowrap;
        flex:0 0 auto;
        min-width:92px;
      ">
        Regenerate
      </button>
    </div>
  </div>
</div>

<div class="summary-card result-reveal result-reveal-delay-2" style="font-size:13px; padding:12px; max-width:420px; margin:0 auto;">
  <div class="summary-row"><span>Age:</span><strong id="age"></strong></div>
  <div class="summary-row"><span>Ethnicity:</span><strong id="ethnicity"></strong></div>
  <div class="summary-row"><span>Body:</span><strong id="body"></strong></div>
  <div class="summary-row"><span>Body Details:</span><strong id="bodyDetails"></strong></div>
  <div class="summary-row"><span>Hair:</span><strong id="hair"></strong></div>
  <div class="summary-row"><span>Appearance:</span><strong id="appearanceDetails"></strong></div>
  <div class="summary-row"><span>Personality:</span><strong id="personality"></strong></div>

  <button class="btn" style="margin-top:10px;height:44px;font-size:14px;" onclick="generateVoice()">
    Generate Voice
  </button>

  <button class="btn" style="margin-top:10px;height:44px;font-size:14px;background:#2a2a2a;border:1px solid #3a3a3a;" onclick="startVideoChat()">
    Video Chat (Coming Soon)
  </button>
</div>

<div id="tokenModal" style="
display:none;
position:fixed;
inset:0;
z-index:20;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
padding:20px;
">
  <div style="
    width:100%;
    max-width:320px;
    background:#1a1a1a;
    border:1px solid #2b2b2b;
    border-radius:18px;
    padding:18px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  ">
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">
      Not enough tokens
    </div>
    <div id="tokenModalText" style="font-size:13px;opacity:0.82;line-height:1.5;margin-bottom:16px;">
      You need 10 tokens to unlock this image.
    </div>

    <button id="getTokensBtn" class="btn" style="margin-bottom:10px;">
      Get Tokens
    </button>

    <button id="subscribeBtn" class="btn" style="
      background:#2a2a2a;
      border:1px solid #3a3a3a;
    ">
      Subscribe
    </button>

    <div id="closeTokenModal" style="
      margin-top:14px;
      font-size:12px;
      opacity:0.7;
      cursor:pointer;
    ">
      Close
    </div>
  </div>
</div>

<div id="infoModal" style="
display:none;
position:fixed;
inset:0;
z-index:21;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
padding:20px;
">
  <div style="
    width:100%;
    max-width:320px;
    background:#1a1a1a;
    border:1px solid #2b2b2b;
    border-radius:18px;
    padding:18px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  ">
    <div id="infoModalTitle" style="font-size:18px;font-weight:700;margin-bottom:8px;">
      Info
    </div>

    <div id="infoModalText" style="font-size:13px;opacity:0.82;line-height:1.5;margin-bottom:16px;">
      Message
    </div>

    <button id="infoModalOkBtn" class="btn">
      OK
    </button>
    <div id="infoModalCloseBtn" style="
margin-top:10px;
font-size:12px;
opacity:0.7;
cursor:pointer;
">
Close
</div>
  </div>
</div>
<div id="pageLoadingOverlay" style="
display:none;
position:fixed;
inset:0;
z-index:9999;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
-webkit-backdrop-filter:blur(4px);
align-items:center;
justify-content:center;
cursor:wait;
">
  <div style="
  width:72px;
  height:72px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.18);
  border-top:4px solid #ff4fa3;
  animation:spin 0.9s linear infinite;
  box-shadow:0 0 28px rgba(255,79,163,0.35);
  "></div>
</div>
<script>
function formatText(text) {
  if (!text) return '-';
  return text.replaceAll('-', ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getProfile() {
  return {
    age: localStorage.getItem('age'),
    ethnicity: localStorage.getItem('ethnicity'),
    body: localStorage.getItem('body'),
    bodyDetails: localStorage.getItem('bodyDetails'),
    hair: localStorage.getItem('hair'),
    appearanceDetails: localStorage.getItem('appearanceDetails'),
    personality: localStorage.getItem('personality')
  };
}

function getCurrentProfileKey() {
  return JSON.stringify(getProfile());
}

function getAccessToken() {
  return localStorage.getItem('accessToken') || '';
}

function authHeaders(extra = {}) {
  const token = getAccessToken();
  return token ? { ...extra, Authorization: 'Bearer ' + token } : extra;
}

function getSafeReturnToFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const value = params.get('returnTo');
  return value === 'index.html' || value === 'result.html' ? value : '';
}

function clearUrlParamsAndHash() {
  history.replaceState({}, document.title, window.location.pathname);
}

function clearCharacterState(){
  [
    'age',
    'ethnicity',
    'body',
    'bodyDetails',
    'hair',
    'appearanceDetails',
    'personality',
    'aiImage',
    'imageUnlocked',
    'lastProfileKey',
    'aiName',
    'recentChats'
  ].forEach(key => localStorage.removeItem(key));
}

function resetStateIfUserChanged(nextUserId){
  const previousUserId = localStorage.getItem('userId');
  if(previousUserId && nextUserId && previousUserId !== nextUserId){
    clearCharacterState();
  }
}

function saveUserSession(user, accessToken, refreshToken) {
  resetStateIfUserChanged(user?.id || '');

  if (accessToken) localStorage.setItem('accessToken', accessToken);
  if (refreshToken) localStorage.setItem('refreshToken', refreshToken);
  if (user?.id) localStorage.setItem('userId', user.id);
  localStorage.setItem('userEmail', user?.email || '');
  localStorage.setItem('userName', user?.user_metadata?.name || 'User');
}

function readAuthFromUrl() {
  const hash = new URLSearchParams(window.location.hash.substring(1));
  const search = new URLSearchParams(window.location.search);
  const accessToken = hash.get('access_token') || search.get('access_token') || '';
  const refreshToken = hash.get('refresh_token') || search.get('refresh_token') || '';
  return { accessToken, refreshToken };
}

  const { accessToken, refreshToken } = readAuthFromUrl();
  if (!accessToken) return false;

  try {
    const res = await fetch('/api/session', {
      headers: {
        Authorization: 'Bearer ' + accessToken
      }
    });

    const json = await res.json();
    const user = json.data?.session?.user;

    if (user) {
      saveUserSession(user, accessToken, refreshToken);

const returnTo = localStorage.getItem('loginReturnTo');

if (returnTo) {
  localStorage.removeItem('loginReturnTo');

  if (returnTo === 'index.html') {
    window.location.replace('index.html');
    return true;
  }

  // اگر result بود، فقط ادامه بده (هیچ redirect نکن)
}

      clearUrlParamsAndHash();
      return true;
    }
  } catch (e) {}

  return false;
}

async function syncStoredSession(){
  const token = getAccessToken();
  if (!token) return;

  try {
    const res = await fetch('/api/session', {
      headers: authHeaders()
    });
    const json = await res.json();
    const session = json?.data?.session;

    if (session?.user) {
      saveUserSession(session.user, token, localStorage.getItem('refreshToken') || '');
    }
  } catch (e) {}
}

async function getUserBalance() {
  const token = getAccessToken();
  if (!token) return null;

  try {
    const res = await fetch('/api/wallet', {
      headers: authHeaders()
    });
    const data = await res.json();
    return Number(data.balance || 0);
  } catch (e) {
    return 0;
  }
}

function goLoginFromResult() {
  localStorage.setItem('loginReturnTo', 'result.html');
  window.location.href = 'login.html';
}

async function startChat() {
  const token = getAccessToken();
  if (!token) {
    goLoginFromResult();
    return;
  }

  const balance = await getUserBalance();
  if (balance < 5) {
    openTokenModalWithAmount(5);
    return;
  }

  window.location.href = 'chat.html';
}

function generateVoice() {
  const token = getAccessToken();

  if (!token) {
    goLoginFromResult();
    return;
  }

  getUserBalance().then(balance => {
    if (balance < 5) {
      openTokenModalWithAmount(5);
      return;
    }

    openInfoModal(
      'Voice Chat',
      'You can chat with her by voice. Custom voice generation coming soon.'
    );
  });
}

function startVideoChat() {
  const token = getAccessToken();

  if (!token) {
    goLoginFromResult();
    return;
  }

  getUserBalance().then(balance => {
    if (balance < 20) {
      openTokenModalWithAmount(20);
      return;
    }

    openInfoModal('Video Chat', 'Coming soon.');
  });
}

const img = document.getElementById('aiImage');
const pageLoadingOverlay = document.getElementById('pageLoadingOverlay');
const imageLock = document.getElementById('imageLock');

function showPageLoading(){
  pageLoadingOverlay.style.display = 'flex';
}

function hidePageLoading(){
  pageLoadingOverlay.style.display = 'none';
}

const tokenEl = document.getElementById('tokenBalance');
const tokenModal = document.getElementById('tokenModal');
const closeTokenModal = document.getElementById('closeTokenModal');
const getTokensBtn = document.getElementById('getTokensBtn');
const subscribeBtn = document.getElementById('subscribeBtn');
const editBtn = document.getElementById('editBtn');
const regenerateBtn = document.getElementById('regenerateBtn');
const tokenModalText = document.getElementById('tokenModalText');

const infoModal = document.getElementById('infoModal');
const infoModalTitle = document.getElementById('infoModalTitle');
const infoModalText = document.getElementById('infoModalText');
const infoModalOkBtn = document.getElementById('infoModalOkBtn');
const infoModalCloseBtn = document.getElementById('infoModalCloseBtn');

function openTokenModal() {
  tokenModal.style.display = 'flex';
}

function openTokenModalWithAmount(amount) {
  tokenModalText.innerText = `You need ${amount} tokens.`;
  tokenModal.style.display = 'flex';
}

function closeModal() {
  tokenModal.style.display = 'none';
}

let pendingInfoAction = null;

function openInfoModal(title, text, onOk = null) {
  infoModalTitle.innerText = title;
  infoModalText.innerText = text;
  pendingInfoAction = typeof onOk === 'function' ? onOk : null;
  infoModal.style.display = 'flex';
}

function closeInfoModal() {
  infoModal.style.display = 'none';
  pendingInfoAction = null;
}

async function refreshBalance() {
  const token = getAccessToken();
  if (!token) {
    tokenEl.innerText = '💰 0';
    return;
  }

  try {
    const res = await fetch('/api/wallet', {
      headers: authHeaders()
    });
    const data = await res.json();

    if (data.balance !== undefined) {
      tokenEl.innerText = '💰 ' + data.balance;
      if (data.userId) {
        localStorage.setItem('userId', data.userId);
      }
    } else {
      tokenEl.innerText = '💰 0';
    }
  } catch (e) {
    tokenEl.innerText = '💰 0';
  }
}

function applyProfileToSummary() {
  document.getElementById('age').textContent = formatText(localStorage.getItem('age'));
  document.getElementById('ethnicity').textContent = formatText(localStorage.getItem('ethnicity'));
  document.getElementById('body').textContent = formatText(localStorage.getItem('body'));
  document.getElementById('bodyDetails').textContent = formatText(localStorage.getItem('bodyDetails'));
  document.getElementById('hair').textContent = formatText(localStorage.getItem('hair'));
  document.getElementById('appearanceDetails').textContent = formatText(localStorage.getItem('appearanceDetails'));
  document.getElementById('personality').textContent = formatText(localStorage.getItem('personality'));
}

function applyImageState() {
  const savedImage = localStorage.getItem('aiImage');
  const imageUnlocked = localStorage.getItem('imageUnlocked') === 'true';
  const sameProfile = getCurrentProfileKey() === localStorage.getItem('lastProfileKey');

  if (sameProfile && imageUnlocked && savedImage) {
    img.src = savedImage;
    img.style.filter = 'blur(0px)';
    img.style.opacity = '1';
    imageLock.style.display = 'none';
    editBtn.style.display = 'flex';
    regenerateBtn.style.display = 'flex';
  } else {
    localStorage.removeItem('aiImage');
    localStorage.removeItem('imageUnlocked');

    img.src = 'images/locked-preview.png';
    img.style.filter = 'blur(20px)';
    img.style.opacity = '1';
    imageLock.style.display = 'flex';
    editBtn.style.display = 'flex';
    regenerateBtn.style.display = 'none';
  }

  localStorage.setItem('lastProfileKey', getCurrentProfileKey());
}

async function generateImage() {
  const token = getAccessToken();
  if (!token) {
    goLoginFromResult();
    return;
  }

  showPageLoading();
  imageLock.style.pointerEvents = 'none';

  try {
    const profile = getProfile();
    const aiName = localStorage.getItem('aiName') || 'Luna';

    const res = await fetch('/api', {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({
        msg: 'generate image',
        name: aiName,
        profile
      })
    });

    const data = await res.json();

    if (data.error) {
      hidePageLoading();
      imageLock.style.pointerEvents = 'auto';

      if (data.error === 'Not enough tokens') {
        openTokenModalWithAmount(10);
      } else {
        openInfoModal('Error', 'Something went wrong. Please try again.');
      }

      return;
    }

    if (data.imageUrl) {
      img.style.opacity = '0';

      img.onload = async () => {
        hidePageLoading();
        imageLock.style.pointerEvents = 'auto';
        img.style.filter = 'blur(0px)';
        imageLock.style.display = 'none';
        img.style.opacity = '1';
        editBtn.style.display = 'flex';
        regenerateBtn.style.display = 'flex';
      };

      img.src = data.imageUrl;

      localStorage.setItem('aiImage', data.imageUrl);
      localStorage.setItem('imageUnlocked', 'true');
      localStorage.setItem('lastProfileKey', getCurrentProfileKey());

      if (data.balance !== undefined) {
        tokenEl.innerText = '💰 ' + data.balance;
      } else {
        await refreshBalance();
      }

      return;
    }

    hidePageLoading();
    imageLock.style.pointerEvents = 'auto';
    openInfoModal('Error', 'Something went wrong. Please try again.');
  } catch (err) {
    hidePageLoading();
    imageLock.style.pointerEvents = 'auto';
    openInfoModal('Error', 'Connection error. Please try again.');
  }
}

function editCharacter() {
  const hasImage = localStorage.getItem('imageUnlocked') === 'true';

  if (hasImage) {
    openInfoModal(
      'Change Character',
      'If you continue, this character will not be used for chat. You can find it later in your album.',
      () => {
        localStorage.setItem('funnelFrom', 'result');
        window.location.href = 'age.html';
      }
    );
    return;
  }

  localStorage.setItem('funnelFrom', 'result');
  window.location.href = 'age.html';
}

function goProfile() {
  const token = getAccessToken();

  if (!token) {
    goLoginFromResult();
    return;
  }

  window.location.href = 'profile.html';
}

function goGift() {
  const token = getAccessToken();

  if (!token) {
    goLoginFromResult();
    return;
  }

  window.location.href = 'gift.html';
}

function goSubscribe() {
  const token = getAccessToken();

  if (!token) {
    goLoginFromResult();
    return;
  }

  window.location.href = 'subscribe.html';
}

async function saveProfileToDatabase() {
  const token = getAccessToken();
  if (!token) return;

  const profile = getProfile();

  if (
    !profile.age &&
    !profile.ethnicity &&
    !profile.body &&
    !profile.bodyDetails &&
    !profile.hair &&
    !profile.appearanceDetails &&
    !profile.personality
  ) {
    return;
  }

  try {
    await fetch('/api/save-profile', {
      method: 'POST',
      headers: authHeaders({
        'Content-Type': 'application/json'
      }),
      body: JSON.stringify({ profile })
    });
  } catch (e) {}
}

async function initResultPage() {
  const redirectedByOauth = await syncSessionFromUrl();
  if (redirectedByOauth) return;

  await syncStoredSession();
  applyProfileToSummary();
  await saveProfileToDatabase();
  await refreshBalance();
  applyImageState();
}

document.addEventListener('DOMContentLoaded', initResultPage);
window.addEventListener('pageshow', initResultPage);

imageLock.addEventListener('click', generateImage);

closeTokenModal.addEventListener('click', closeModal);

tokenModal.addEventListener('click', (e) => {
  if (e.target === tokenModal) closeModal();
});

getTokensBtn.addEventListener('click', () => {
  closeModal();
  goGift();
});

subscribeBtn.addEventListener('click', () => {
  closeModal();
  goSubscribe();
});

infoModalOkBtn.addEventListener('click', () => {
  const action = pendingInfoAction;
  closeInfoModal();
  if (action) action();
});

infoModalCloseBtn.addEventListener('click', closeInfoModal);

infoModal.addEventListener('click', (e) => {
  if (e.target === infoModal) closeInfoModal();
});
</script>
</body>
</html>
